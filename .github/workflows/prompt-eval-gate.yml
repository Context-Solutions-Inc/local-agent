name: Canonical prompt + routing eval

# M6 Phase F — exercises the agent's routing decisions and prompt
# assembly against a canonical query set so a change to
# SYSTEM_PROMPT.md / PromptAssembler.kt / PreflightRouter.kt /
# QueryRewriter.kt can't land without proving the v1.0 canonical set
# still routes + assembles correctly.
#
# The test (`CanonicalEvalTest`) feeds each query a hardcoded classifier
# output so the routing layer is exercised independently of classifier
# accuracy (that's covered by `regression-gate.yml`). Failures surface
# every regression in one report, not one-at-a-time.

on:
  pull_request:
    paths:
      - 'SYSTEM_PROMPT.md'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/mobileagent/agent/PromptAssembler.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/mobileagent/classifier/PromptAssembler.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/mobileagent/classifier/PreflightRouter.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/mobileagent/classifier/QueryRewriter.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/mobileagent/agent/**'
      - 'android-app/androidApp/src/test/kotlin/com/contextsolutions/mobileagent/canonical/**'
      - 'eval/canonical/**'
  workflow_dispatch:

jobs:
  canonical-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/gradle/wrapper/gradle-wrapper.properties', 'android-app/gradle/libs.versions.toml', 'android-app/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run canonical eval
        # Single test file — exercises the routing path + PromptAssembler.
        # Failures bundle every regression in one assertion message.
        run: ./gradlew :androidApp:testDebugUnitTest --tests "com.contextsolutions.mobileagent.canonical.*"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-eval-test-reports
          path: android-app/androidApp/build/reports/tests/testDebugUnitTest/
          retention-days: 7
