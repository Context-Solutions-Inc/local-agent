name: Canonical prompt + routing eval

# M6 Phase F — exercises the agent's routing decisions and prompt
# assembly against a canonical query set so a change to
# SYSTEM_PROMPT.md / PromptAssembler.kt / PreflightRouter.kt /
# QueryRewriter.kt can't land without proving the v1.0 canonical set
# still routes + assembles correctly.
#
# The test (`CanonicalEvalTest`) feeds each query a hardcoded classifier
# output so the routing layer is exercised independently of classifier
# accuracy (that's covered by `regression-gate.yml`). Failures surface
# every regression in one report, not one-at-a-time.

on:
  pull_request:
    paths:
      - 'SYSTEM_PROMPT.md'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/localagent/agent/PromptAssembler.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/localagent/classifier/PromptAssembler.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/localagent/classifier/PreflightRouter.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/localagent/classifier/QueryRewriter.kt'
      - 'android-app/shared/src/commonMain/kotlin/com/contextsolutions/localagent/agent/**'
      - 'android-app/androidApp/src/test/kotlin/com/contextsolutions/localagent/canonical/**'
      - 'eval/canonical/**'
  workflow_dispatch:

jobs:
  canonical-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/gradle/wrapper/gradle-wrapper.properties', 'android-app/gradle/libs.versions.toml', 'android-app/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Diagnose GitHub Packages auth (TEMP — remove before merge)
        env:
          PAT: ${{ secrets.SECURE_GATEWAY_PAT }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "github.actor = $ACTOR"
          echo "SECURE_GATEWAY_PAT length = ${#PAT}   (0 = secret missing/not granted to repo)"
          echo "--- classic-PAT scopes (X-OAuth-Scopes) ---"
          curl -sI -H "Authorization: Bearer $PAT" https://api.github.com/user | grep -iE "^HTTP|x-oauth-scopes|x-accepted-oauth-scopes" || true
          echo "--- direct package GET (actor as username) ---"
          curl -s -o /dev/null -w "actor-auth http=%{http_code}\n" -u "$ACTOR:$PAT" -L \
            "https://maven.pkg.github.com/Context-Solution-Inc/secure-gateway/com/contextsolutions/securegateway/core/0.2.3/core-0.2.3.pom" || true

      - name: Run canonical eval
        # Single test file — exercises the routing path + PromptAssembler.
        # Failures bundle every regression in one assertion message.
        #
        # The :androidApp build resolves the relay SDK
        # (com.contextsolutions.securegateway:{android,core}) from secure-gateway's GitHub
        # Packages Maven registry (M4 Step 2 — replaces the old sibling-checkout +
        # publishToMavenLocal). secure-gateway is PRIVATE and cross-repo, so the local-agent
        # GITHUB_TOKEN can't read it — pass SECURE_GATEWAY_PAT (a PAT/fine-grained token with
        # `read:packages` on Context-Solution-Inc/secure-gateway) as GITHUB_TOKEN.
        # Dependency verification (gradle/verification-metadata.xml) pins every resolved
        # artifact, the SDK included.
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.SECURE_GATEWAY_PAT }}
        run: ./gradlew :androidApp:testDebugUnitTest --tests "com.contextsolutions.localagent.canonical.*"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-eval-test-reports
          path: android-app/androidApp/build/reports/tests/testDebugUnitTest/
          retention-days: 7
