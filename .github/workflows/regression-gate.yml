name: Classifier regression gate

# M6 Phase F — `ct-regression-check` guards the v1.0 classifier regression
# baseline (a new .tflite / dataset / training-code change must prove the
# baseline still holds before it lands).
#
# **Manual / operator-run only (workflow_dispatch).** The check needs the frozen
# regression splits (`datasets/**/*_regression.jsonl`) and — for the full path —
# a `.pt` checkpoint, all of which are gitignored (`.gitignore`: datasets/**/
# *.jsonl) and so are NOT present in a stock GitHub-hosted checkout. Run this
# where that data lives (a self-hosted runner or locally via the same CLI). It is
# deliberately NOT wired to `pull_request`: it can't run on a fresh PR checkout,
# and the desktop-port PRs that touch `classifier-training/**` add tooling
# without changing the model or the frozen splits, so an auto-gate there only
# produces false failures. (Local pre-merge run-book is in CLAUDE.md → "WS-14
# regression gate".)
#
# Two modes:
#   - Default dispatch (full_eval: false): `--skip-eval` — SHA-only gate. Feeds
#     the committed baseline metrics.json back in as the candidate so the diff is
#     a trivial pass; the real assertion is that the frozen regression splits
#     still match their MANIFEST.md SHA-256s. Fast; no torch.
#   - full_eval: true: `ct-regression-check --ckpt <ckpt_path>` — loads the model
#     and runs the full classifier eval. Installs [training] extras (torch +
#     transformers). Use when a classifier .tflite is being updated.

on:
  workflow_dispatch:
    inputs:
      full_eval:
        description: 'Run full ct-regression-check (loads torch + classifier checkpoint). Pass the checkpoint path in `ckpt_path`.'
        required: false
        type: boolean
        default: false
      ckpt_path:
        description: 'Path to the candidate .pt checkpoint, relative to repo root. Required when full_eval = true.'
        required: false
        type: string
        default: ''

jobs:
  regression-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: classifier-training
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # Cache the pip cache directory keyed on pyproject.toml. Cache
          # hit makes the install fast; miss is ~3 min cold and still
          # well under the GHA budget.
          cache: 'pip'
          cache-dependency-path: 'classifier-training/pyproject.toml'

      - name: Install ct-regression-check (dev only by default)
        # `[dev]` covers the regression-check + manifest validation deps.
        # `[training]` (torch / transformers) is only needed for the full
        # eval path; install it conditionally below.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install training extras (full eval only)
        if: ${{ inputs.full_eval == true }}
        run: python -m pip install -e '.[training]'

      - name: Run SHA-only regression check
        if: ${{ inputs.full_eval == false }}
        # `--skip-eval` verifies the regression-split SHA-256s against
        # MANIFEST.md. `--ckpt` is required even here — it's read as the
        # candidate metrics.json, so we pass the committed baseline (candidate ==
        # baseline → diff is a no-op; the SHA check is the gate). Exits 0/1/2/3 →
        # PASS / SHA mismatch / regression / infrastructure error.
        run: ct-regression-check --skip-eval --ckpt ../eval/runs/phaseF_full_20260509_162556/metrics.json

      - name: Run full classifier eval
        if: ${{ inputs.full_eval == true }}
        run: |
          if [ -z "${{ inputs.ckpt_path }}" ]; then
            echo "::error::full_eval requires ckpt_path"
            exit 1
          fi
          ct-regression-check --ckpt "../${{ inputs.ckpt_path }}"
