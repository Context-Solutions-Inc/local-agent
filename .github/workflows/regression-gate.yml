name: Classifier regression gate

# M6 Phase F — runs `ct-regression-check` on every PR touching classifier
# artifacts so a new .tflite / dataset / training-code change can't land
# without proving the v1.0 regression baseline still holds.
#
# Two modes:
#   - Default (pull_request): `--skip-eval`. SHA-only gate over the
#     regression JSONLs + manifests. Fast (~30 s with cache). Does NOT
#     install torch / transformers. Catches "did someone change the
#     regression set without bumping the SHA" and "is the regression
#     JSONL present at all".
#   - Manual (`workflow_dispatch` with `full_eval: true`): runs
#     `ct-regression-check --ckpt <path>` which loads the model and runs
#     the full classifier eval. Installs [training] extras (torch +
#     transformers, ~3 min cold). Use this when a classifier .tflite is
#     being updated — the SHA-only path doesn't catch numerical
#     regressions in the model itself.

on:
  pull_request:
    paths:
      - 'models/**'
      - 'datasets/**'
      - 'classifier-training/**'
  workflow_dispatch:
    inputs:
      full_eval:
        description: 'Run full ct-regression-check (loads torch + classifier checkpoint). Pass the checkpoint path in `ckpt_path`.'
        required: false
        type: boolean
        default: false
      ckpt_path:
        description: 'Path to the candidate .pt checkpoint, relative to repo root. Required when full_eval = true.'
        required: false
        type: string
        default: ''

jobs:
  regression-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: classifier-training
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache the pip cache directory keyed on pyproject.toml. Cache
          # hit makes the install fast; miss is ~3 min cold and still
          # well under the GHA budget.
          cache: 'pip'
          cache-dependency-path: 'classifier-training/pyproject.toml'

      - name: Install ct-regression-check (dev only by default)
        # `[dev]` covers the regression-check + manifest validation deps.
        # `[training]` (torch / transformers) is only needed for the full
        # eval path; install it conditionally below.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install training extras (full eval only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_eval == true }}
        run: python -m pip install -e '.[training]'

      - name: Run SHA-only regression check (PR path)
        if: ${{ github.event_name == 'pull_request' }}
        # `--skip-eval` verifies regression-set SHA-256s against
        # MANIFEST.md without loading the model. Exits 0/1/2/3 →
        # PASS / SHA mismatch / regression / infrastructure error.
        run: ct-regression-check --skip-eval

      - name: Run full classifier eval (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_eval == true }}
        run: |
          if [ -z "${{ inputs.ckpt_path }}" ]; then
            echo "::error::full_eval requires ckpt_path"
            exit 1
          fi
          ct-regression-check --ckpt "../${{ inputs.ckpt_path }}"
