# Mobile-agent dev container.
#
# Quickstart:
#   docker compose build                              # first time, ~10 min
#   docker compose run --rm dev                       # interactive shell
#   docker compose run --rm dev ./gradlew :androidApp:assembleDebug
#   docker compose run --rm dev ./gradlew test
#   docker compose run --rm dev claude                # Claude Code (uses host OAuth)
#   docker compose run --rm dev claude --dangerously-skip-permissions   # auto mode
#   docker compose run --rm dev ct-stats              # classifier-training CLI (Python)
#   docker compose run --rm dev gh pr list            # GitHub CLI (auth: see below)
#
# GitHub CLI + git auth: the host stores its token in the OS keyring, not in
# ~/.config/gh, so the bound config carries no token at first. Authenticate ONCE
# inside the container (no keyring here, so gh writes the token to the bound
# ~/.config/gh/hosts.yml, which then persists on the host):
#   docker compose run --rm dev gh auth login          # paste a token / browser flow
# Thereafter `gh ...` and `git push` (which routes through `gh auth git-credential`)
# just work. Prefer the host token instead? `export GH_TOKEN=$(gh auth token)`
# before launching — it overrides the bound config.
#
# What's mounted:
#   - Project dir mounts at the SAME path as on host (/home/lawrenceley/src/mobile-agent)
#     so Claude Code per-project memory keys keep matching.
#   - ~/.claude + ~/.claude.json are mounted RW so the container reuses your host
#     login session AND its account/onboarding state survives across containers.
#   - ~/.gitconfig is mounted RO so commits use your host git identity.
#   - ~/.config/gh is mounted RW; log in once with `gh auth login` (the host
#     keyring can't be read from here, so the bound file gets the token).
#   - Gradle and Android caches live in named volumes (faster, no perm churn).
#
# Python: 3.11 + the classifier-training stack are baked into a venv at /opt/venv
# (on PATH), installed editable against the bind-mounted source — the ct-* CLIs run
# against your live working tree.
#
# Memory: the host needs ~6 GB free for the build (gradle.properties pins -Xmx4g).

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    image: mobile-agent-dev:latest
    hostname: mobile-agent-dev
    working_dir: /home/lawrenceley/src/mobile-agent
    environment:
      # Optional API key fallback for Claude Code if you'd rather use it instead
      # of the mounted OAuth session. Leave unset to use the host login.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Optional GitHub token override. Normally unset — gh auth lives in the
      # bound ~/.config/gh (`gh auth login` once). Set it (`export GH_TOKEN=$(gh
      # auth token)` on the host) only to override the bound config.
      GH_TOKEN: "${GH_TOKEN:-}"
      TERM: "${TERM:-xterm-256color}"
    volumes:
      # Project source — same path inside the container as on the host.
      - type: bind
        source: .
        target: /home/lawrenceley/src/mobile-agent
      # Claude Code state (OAuth tokens, settings, per-project memory).
      - type: bind
        source: ${HOME}/.claude
        target: /home/dev/.claude
      # Claude Code ALSO keeps account + onboarding state in ~/.claude.json (a file
      # in HOME, NOT inside ~/.claude). Without this it lives only in the container
      # overlay and is lost on --rm, so each new container looks logged-out even
      # though the token file above persists. Bind it so auth survives. Like the
      # keystore/gitconfig below, the host file must already exist — if not,
      # Docker creates an empty DIR at that path; run `touch ~/.claude.json` on
      # the host first. (RW: Claude Code updates project-trust/onboarding here.)
      - type: bind
        source: ${HOME}/.claude.json
        target: /home/dev/.claude.json
      # Share the host debug keystore so APKs built here and on the host sign
      # identically — otherwise re-installing across host/container hits
      # INSTALL_FAILED_UPDATE_INCOMPATIBLE on the connected device.
      - type: bind
        source: ${HOME}/.android/debug.keystore
        target: /home/dev/.android/debug.keystore
      # Host git identity (user.name/email, aliases) so commits made in the
      # container are attributed correctly — no per-launch `git config`. Read-only
      # so the container can't mutate your host gitconfig. Assumes the host has a
      # ~/.gitconfig (like the keystore above); if not, Docker would create an
      # empty dir at that path — `touch ~/.gitconfig` on the host first if needed.
      - type: bind
        source: ${HOME}/.gitconfig
        target: /home/dev/.gitconfig
        read_only: true
      # gh CLI config + auth, bound RW from the host (same approach as ~/.claude
      # above). The host keeps its token in the OS keyring — absent from
      # ~/.config/gh — so the bound config has no token until you log in. Run
      # `gh auth login` ONCE inside the container: there's no keyring here, so gh
      # writes the token to this dir's hosts.yml, which lands on the host and
      # persists for every future run. That also fixes `git push`: the host
      # ~/.gitconfig (mounted RO below) routes credentials through
      # `gh auth git-credential`, which reads this dir. RW (not RO as before) so
      # that first login can write the token back. (GH_TOKEN still overrides it.)
      - type: bind
        source: ${HOME}/.config/gh
        target: /home/dev/.config/gh
      # Persisted caches across container runs.
      - gradle-cache:/home/dev/.gradle
      - android-user-cache:/home/dev/.android
      - npm-cache:/home/dev/.npm
    tty: true
    stdin_open: true
    # No restart policy — this is an on-demand dev shell, not a service.

volumes:
  gradle-cache:
  android-user-cache:
  npm-cache:
